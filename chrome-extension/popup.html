<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AIAuth</title>
  <style>
    body {
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 360px;
      margin: 0;
      padding: 14px;
      color: #1a1a1a;
    }
    h1 { font-size: 15px; margin: 0 0 4px; }
    .muted { color: #777; font-size: 11px; }
    .section { margin-top: 14px; }
    .section h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #888;
      margin: 0 0 6px;
      font-weight: 600;
    }
    label { display: block; font-size: 12px; color: #555; margin-top: 6px; }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: inherit;
    }
    textarea { height: 60px; resize: vertical; }
    button {
      padding: 6px 10px;
      font-size: 12px;
      border: 0;
      border-radius: 6px;
      background: #111;
      color: #fff;
      cursor: pointer;
    }
    button.secondary { background: #eee; color: #111; }
    button.tiny { padding: 3px 7px; font-size: 11px; }
    button:disabled { opacity: 0.6; cursor: default; }
    #status { font-size: 12px; margin-top: 8px; min-height: 16px; }
    .ok { color: #1a7f37; }
    .err { color: #b42318; }
    .row { display: flex; gap: 6px; }
    .row button { flex: 1; }

    #receipts { max-height: 180px; overflow-y: auto; border: 1px solid #eee; border-radius: 6px; }
    #receipts:empty::after {
      content: "No receipts yet. Select AI text and press Ctrl+Shift+A.";
      display: block;
      padding: 12px;
      color: #999;
      font-size: 12px;
      text-align: center;
    }
    .rcpt {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px;
      padding: 8px 10px;
      border-bottom: 1px solid #f0f0f0;
      align-items: center;
    }
    .rcpt:last-child { border-bottom: 0; }
    .rcpt-code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
    .rcpt-meta { color: #888; font-size: 11px; margin-top: 2px; }
    .rcpt-actions { display: flex; gap: 4px; }
    code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
    .drop {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px; border: 2px dashed #ccc; border-radius: 8px;
      text-align: center; cursor: pointer; transition: border-color 120ms, background 120ms;
    }
    .drop:hover, .drop.hover { border-color: #2563eb; background: #f5f8ff; }
    .drop-label { font-size: 13px; font-weight: 600; }
    .drop-sub { font-size: 11px; color: #888; margin-top: 4px; }
    .drop.busy { opacity: 0.7; pointer-events: none; }
  </style>
</head>
<body>
  <h1>AIAuth</h1>
  <div class="muted">Ctrl+Shift+A on a supported AI site to attest selected text.</div>

  <div class="section">
    <h2>Recent receipts</h2>
    <div id="receipts"></div>
  </div>

  <div class="section">
    <h2>Settings</h2>
    <label for="userId">Your email or name</label>
    <input id="userId" type="text" placeholder="you@example.com" />
    <label for="server">Server</label>
    <input id="server" type="text" placeholder="https://aiauth.app" />
    <div class="row" style="margin-top:8px;">
      <button id="save">Save</button>
      <button id="health" class="secondary">Check server</button>
    </div>
  </div>

  <div class="section">
    <h2>Attest a file</h2>
    <div id="drop" class="drop">
      <span class="drop-label">Drop a file here, or click to choose</span>
      <span class="drop-sub">Excel, PDF, Word, images — any file. Hashed locally, file never uploaded.</span>
    </div>
    <input id="filePicker" type="file" style="display:none" />
  </div>

  <div class="section">
    <h2>Attest pasted text</h2>
    <textarea id="manual" placeholder="Paste AI output here"></textarea>
    <button id="sign" style="margin-top:6px;">Attest text</button>
  </div>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
