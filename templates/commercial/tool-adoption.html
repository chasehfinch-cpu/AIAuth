<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>AIAuth — Tool Adoption</title>
  <style>
    body { font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; color: #0f172a; margin: 0; padding: 40px 24px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.4px; }
    .sub { color: #64748b; font-size: 13px; margin-bottom: 32px; }
    h2 { font-size: 17px; margin: 28px 0 12px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 18px; margin-bottom: 20px; }
    .bar-row { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
    .bar-label { width: 160px; font-size: 13px; font-weight: 600; }
    .bar-sub { font-size: 11px; color: #64748b; font-weight: 400; }
    .bar-wrap { flex: 1; background: #f1f5f9; height: 10px; border-radius: 5px; overflow: hidden; }
    .bar-fill { background: #2563eb; height: 100%; }
    .bar-val { width: 80px; text-align: right; font-size: 13px; font-variant-numeric: tabular-nums; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; color: #64748b; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 12px; border-bottom: 1px solid #e5e7eb; }
    td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
    .status-pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .status-pill.approved { background: #dcfce7; color: #16a34a; }
    .status-pill.unapproved { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>
<div class="container">
  <h1>Tool Adoption</h1>
  <div class="sub" id="subhead">Loading…</div>

  <h2>AI Tools by Volume</h2>
  <div class="card" id="bars"></div>

  <h2>Approved vs. Unapproved Tools</h2>
  <div class="card">
    <table>
      <thead><tr><th>Tool</th><th>Provider</th><th>Attestations</th><th>Avg TTA</th><th>Status</th></tr></thead>
      <tbody id="toolTable"></tbody>
    </table>
    <p style="font-size:12px;color:#64748b;margin-top:12px;">Approved list is configured per-org by Compliance. Shadow AI alerts fire when unapproved tools are detected in concurrent_ai_apps.</p>
  </div>
</div>

<script src="synthetic-data.js"></script>
<script>
  const APPROVED = new Set(["claude", "chatgpt", "copilot"]);
  async function render() {
    const qp = new URLSearchParams(location.search);
    const opts = qp.get("company") ? { company: qp.get("company") } : {};
    const d = window.AIAuthSynthetic.generateDashboardData(opts);
    document.getElementById("subhead").textContent = `${d.meta?.org_name || "—"} · ${(d.by_model || []).length} AI tools detected`;

    const fmt = n => (n || 0).toLocaleString();
    const max = Math.max(1, ...(d.by_model || []).map(m => m.count));
    const bars = document.getElementById("bars");
    for (const m of (d.by_model || [])) {
      const row = document.createElement("div");
      row.className = "bar-row";
      row.innerHTML =
        `<div class="bar-label">${m.model}<div class="bar-sub">${m.provider}</div></div>` +
        `<div class="bar-wrap"><div class="bar-fill" style="width:${(m.count / max * 100).toFixed(0)}%"></div></div>` +
        `<div class="bar-val">${fmt(m.count)}</div>`;
      bars.appendChild(row);
    }

    const tbody = document.getElementById("toolTable");
    for (const m of (d.by_model || [])) {
      const approved = APPROVED.has((m.model || "").toLowerCase());
      const tr = document.createElement("tr");
      tr.innerHTML =
        `<td>${m.model}</td>` +
        `<td>${m.provider}</td>` +
        `<td>${fmt(m.count)}</td>` +
        `<td>${m.avg_tta ? m.avg_tta + "s" : "—"}</td>` +
        `<td><span class="status-pill ${approved ? "approved" : "unapproved"}">${approved ? "Approved" : "Unapproved"}</span></td>`;
      tbody.appendChild(tr);
    }
  }
  render();
</script>
</body>
</html>
