name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Install only the core deps server.py imports at module load time.
        # requirements.txt also lists the optional self-hosted-agent deps
        # (pikepdf, pdfplumber, python-docx, imagehash, ...) which pull in
        # system libraries like libqpdf that aren't on the CI runner. Tests
        # don't exercise those code paths.
        run: |
          python -m pip install --upgrade pip
          pip install \
            "fastapi>=0.110.0" \
            "uvicorn>=0.27.0" \
            "pydantic>=2.0.0" \
            "cryptography>=42.0.0" \
            "markdown>=3.5" \
            "resend>=0.8.0"
          pip install -r requirements-dev.txt

      - name: Run test suite
        env:
          SERVER_SECRET: ci-test-server-secret-do-not-use-in-prod
          AIAUTH_MASTER_KEY: ci-test-master-key
        run: |
          pytest -v --tb=short --cov=server --cov-report=term-missing

      - name: Upload coverage summary
        if: matrix.python-version == '3.12'
        run: |
          pytest --cov=server --cov-report=xml
        continue-on-error: true
